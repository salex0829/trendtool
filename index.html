<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Gacha</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:             #07070f;
    --surface:        #0d0d1c;
    --border:         rgba(255,255,255,0.06);
    --border-mid:     rgba(255,255,255,0.10);
    --text-primary:   #ddddf0;
    --text-secondary: #6b6b8e;
    --text-muted:     #30304a;

    --mega:        #a78bfa;
    --mega-dark:   rgba(167,139,250,0.12);
    --mega-glow:   rgba(167,139,250,0.18);
    --middle:      #56c0e8;
    --middle-dark: rgba(86,192,232,0.12);
    --middle-glow: rgba(86,192,232,0.18);
    --micro:       #4dd9a8;
    --micro-dark:  rgba(77,217,168,0.12);
    --micro-glow:  rgba(77,217,168,0.18);
    --neutral:     #7070a0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px 80px;
  }

  /* ─── Header ─────────────────────────────── */
  .eyebrow {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(1.9rem, 5vw, 2.8rem);
    font-weight: 200;
    letter-spacing: 0.06em;
    color: var(--text-primary);
    margin-bottom: 10px;
    text-align: center;
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
    margin-bottom: 52px;
    font-weight: 300;
  }

  /* ─── Mode Tabs ───────────────────────────── */
  .mode-tabs {
    display: flex;
    gap: 3px;
    margin-bottom: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
  }

  .mode-tab {
    padding: 7px 20px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: transparent;
    color: var(--text-secondary);
    transition: color 0.2s, background 0.2s;
    font-family: inherit;
  }

  .mode-tab:hover { color: var(--text-primary); }
  .mode-tab.is-active         { background: var(--neutral); color: #fff; }
  .mode-tab.is-active.mega    { background: var(--mega);    color: #0c0c1a; }
  .mode-tab.is-active.middle  { background: var(--middle);  color: #0c0c1a; }
  .mode-tab.is-active.micro   { background: var(--micro);   color: #0c0c1a; }

  /* ─── Orb ─────────────────────────────────── */
  .orb-wrap {
    position: relative;
    width: 184px;
    height: 184px;
    margin-bottom: 36px;
  }

  .orb-glow {
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    background: rgba(112,112,160,0.12);
    filter: blur(24px);
    transition: background 0.6s ease;
    pointer-events: none;
  }
  .orb-wrap.mega   .orb-glow { background: var(--mega-glow); }
  .orb-wrap.middle .orb-glow { background: var(--middle-glow); }
  .orb-wrap.micro  .orb-glow { background: var(--micro-glow); }

  .orb-ring {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .orb-ring-outer { inset: 0;    border: 1px dashed var(--border);    animation: orbSpin 22s linear infinite; }
  .orb-ring-mid   { inset: 22px; border: 1px solid var(--border-mid); animation: orbSpin 14s linear infinite reverse; }
  .orb-ring-inner { inset: 44px; border: 1px dotted var(--border);    animation: orbSpin 30s linear infinite; }

  .orb-arc {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    border-top-color: var(--neutral);
    animation: orbSpin 4s linear infinite;
    opacity: 0.5;
    transition: border-top-color 0.5s ease, opacity 0.5s ease;
    pointer-events: none;
  }
  .orb-wrap.mega   .orb-arc { border-top-color: var(--mega);   opacity: 0.7; }
  .orb-wrap.middle .orb-arc { border-top-color: var(--middle); opacity: 0.7; }
  .orb-wrap.micro  .orb-arc { border-top-color: var(--micro);  opacity: 0.7; }

  .orb-core {
    position: absolute;
    inset: 58px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #191930, var(--bg));
    border: 1px solid var(--border-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.7);
    transition: box-shadow 0.5s ease;
  }
  .orb-wrap.mega   .orb-core { box-shadow: inset 0 2px 8px rgba(0,0,0,0.7), 0 0 20px var(--mega-glow); }
  .orb-wrap.middle .orb-core { box-shadow: inset 0 2px 8px rgba(0,0,0,0.7), 0 0 20px var(--middle-glow); }
  .orb-wrap.micro  .orb-core { box-shadow: inset 0 2px 8px rgba(0,0,0,0.7), 0 0 20px var(--micro-glow); }

  @keyframes orbSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .orb-wrap.spinning .orb-ring-outer { animation-duration: 1.2s; }
  .orb-wrap.spinning .orb-ring-mid   { animation-duration: 0.8s; }
  .orb-wrap.spinning .orb-ring-inner { animation-duration: 1.6s; }
  .orb-wrap.spinning .orb-arc        { animation-duration: 0.25s; opacity: 1; }
  .orb-wrap.spinning .orb-core       { animation: corePulse 0.65s ease-in-out; }

  @keyframes corePulse {
    0%   { transform: scale(1);   opacity: 1;   }
    35%  { transform: scale(0.8); opacity: 0.2; }
    100% { transform: scale(1);   opacity: 1;   }
  }

  /* ─── Draw Button ─────────────────────────── */
  .draw-btn {
    padding: 12px 48px;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border: 1px solid var(--border-mid);
    border-radius: 3px;
    cursor: pointer;
    background: transparent;
    color: var(--text-primary);
    font-family: inherit;
    transition: background 0.2s, border-color 0.2s;
  }
  .draw-btn:hover    { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.2); }
  .draw-btn:active   { opacity: 0.6; }
  .draw-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .key-hint {
    margin-top: 10px;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 48px;
  }

  /* ─── Modal Overlay ───────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(7, 7, 15, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    z-index: 100;
  }

  .modal-overlay.is-open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  /* ─── Modal Card ──────────────────────────── */
  .modal-card {
    position: relative;
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border-mid);
    border-radius: 16px;
    padding: 44px 48px 44px 52px;
    transform: translateY(32px) scale(0.95);
    opacity: 0;
    transition:
      transform 0.48s cubic-bezier(0.16, 1, 0.3, 1),
      opacity   0.48s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .modal-overlay.is-open .modal-card {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  /* Left accent stripe */
  .modal-card::before {
    content: '';
    position: absolute;
    left: 0; top: 28px; bottom: 28px;
    width: 2px;
    border-radius: 0 2px 2px 0;
  }
  .modal-card.mega::before   { background: var(--mega); }
  .modal-card.middle::before { background: var(--middle); }
  .modal-card.micro::before  { background: var(--micro); }

  /* Corner glow */
  .modal-card::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    border-radius: 50%;
    opacity: 0.08;
    filter: blur(56px);
    pointer-events: none;
  }
  .modal-card.mega::after   { background: var(--mega); }
  .modal-card.middle::after { background: var(--middle); }
  .modal-card.micro::after  { background: var(--micro); }

  .modal-close {
    position: absolute;
    top: 18px; right: 20px;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 0.65rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    font-family: inherit;
    z-index: 1;
  }
  .modal-close:hover {
    border-color: var(--border-mid);
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
  }

  .modal-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 26px;
  }

  .modal-tag {
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 3px;
  }
  .modal-card.mega   .modal-tag { background: var(--mega-dark);   color: var(--mega); }
  .modal-card.middle .modal-tag { background: var(--middle-dark); color: var(--middle); }
  .modal-card.micro  .modal-tag { background: var(--micro-dark);  color: var(--micro); }

  .modal-timespan {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .modal-icon {
    position: absolute;
    right: 48px; top: 40px;
    font-size: 2.2rem;
    opacity: 0.25;
    pointer-events: none;
  }

  .modal-title-jp {
    font-size: 1.4rem;
    font-weight: 500;
    letter-spacing: 0.025em;
    line-height: 1.45;
    color: var(--text-primary);
    margin-bottom: 7px;
    padding-right: 48px;
  }

  .modal-title-en {
    font-size: 0.74rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    margin-bottom: 24px;
  }

  .modal-rule {
    width: 28px; height: 1px;
    background: var(--border-mid);
    margin-bottom: 20px;
  }

  .modal-desc {
    font-size: 0.9rem;
    font-weight: 300;
    line-height: 1.9;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
  }

  /* ─── History ─────────────────────────────── */
  .history-wrap {
    width: 100%;
    max-width: 520px;
  }

  .history-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .history-label {
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .clear-btn {
    font-size: 0.58rem;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s;
    padding: 0;
  }
  .clear-btn:hover { color: var(--text-secondary); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:hover { background: var(--surface); }

  .h-pip { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
  .history-item.mega   .h-pip { background: var(--mega); }
  .history-item.middle .h-pip { background: var(--middle); }
  .history-item.micro  .h-pip { background: var(--micro); }

  .h-icon { font-size: 0.85rem; opacity: 0.5; }

  .h-name { font-size: 0.8rem; color: var(--text-secondary); flex: 1; font-weight: 300; }

  .h-tier {
    font-size: 0.56rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.6;
  }
  .history-item.mega   .h-tier { color: var(--mega); }
  .history-item.middle .h-tier { color: var(--middle); }
  .history-item.micro  .h-tier { color: var(--micro); }
</style>
</head>
<body>

<p class="eyebrow">Future Signals</p>
<h1>Trend Gacha</h1>
<p class="subtitle">未来の兆しをランダムに引く — Mega · Middle · Micro</p>

<!-- Mode Tabs -->
<div class="mode-tabs">
  <button class="mode-tab is-active" onclick="setMode('all',    this)">All</button>
  <button class="mode-tab"           onclick="setMode('mega',   this)">Mega</button>
  <button class="mode-tab"           onclick="setMode('middle', this)">Middle</button>
  <button class="mode-tab"           onclick="setMode('micro',  this)">Micro</button>
</div>

<!-- Orb -->
<div class="orb-wrap" id="orbWrap">
  <div class="orb-glow"></div>
  <div class="orb-ring orb-ring-outer"></div>
  <div class="orb-ring orb-ring-mid"></div>
  <div class="orb-ring orb-ring-inner"></div>
  <div class="orb-arc orb-ring"></div>
  <div class="orb-core" id="orbCore">✦</div>
</div>

<button class="draw-btn" id="drawBtn" onclick="spin()">Draw Trend</button>
<p class="key-hint">Space / Enter でも引けます</p>

<!-- History -->
<div id="historySection" style="display:none">
  <div class="history-wrap">
    <div class="history-head">
      <span class="history-label">History</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-eyebrow">
      <span class="modal-tag" id="modalTag"></span>
      <span class="modal-timespan" id="modalTimespan"></span>

    <span class="modal-icon" id="modalIcon"></span>
    <div class="modal-title-jp" id="modalTitleJp"></div>
    <div class="modal-title-en" id="modalTitleEn"></div>
    <div class="modal-rule"></div>
    <div class="modal-desc" id="modalDesc"></div>
  </div>
</div>

    { jp: "贈与経済ポイント",              en: "Gift Economy Credits",                        desc: "売買ではなく、誰かを助けた履歴だけで生活が完結する特定コミュニティ。",       icon: "🎁" },
    { jp: "「正解」の定額販売",           en: 'Subscription to the "Correct Answer"',        desc: "人生のあらゆる選択においてAIが最適解を提供し続ける。",                       icon: "✅" },
    { jp: "信用ポータビリティ",            en: "Trust Portability",                           desc: "自らの「信頼実績」を個人が完全に管理・運用する。",                           icon: "🔑" },
    { jp: "演算資源の「お裾分け」経済",   en: "Computing Power Sharing Economy",             desc: "個人のデバイスが寝ている間に社会インフラの計算を肩代わりする。",             icon: "💻" },
  ]
};

const TIER_META = {
  mega:   { label: "Mega",   span: "10—30 Years", css: "mega" },
  middle: { label: "Middle", span: "5—10 Years",  css: "middle" },
  micro:  { label: "Micro",  span: "1—5 Years",   css: "micro" },
};

let currentMode = "all";
let history = [];
let spinning = false;

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.className = 'mode-tab');
  btn.classList.add('is-active');
  if (mode !== 'all') btn.classList.add(mode);

  const orb = document.getElementById('orbWrap');
  orb.className = 'orb-wrap' + (mode !== 'all' ? ' ' + mode : '');
}

function pickTrend() {
  const tier = currentMode === 'all'
    ? ['mega','middle','micro'][Math.floor(Math.random() * 3)]
    : currentMode;
  const pool = TRENDS[tier];
  return { tier, item: pool[Math.floor(Math.random() * pool.length)] };
}

function spin() {
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('drawBtn');
  const orb = document.getElementById('orbWrap');
  btn.disabled = true;
  orb.classList.add('spinning');

  setTimeout(() => {
    orb.classList.remove('spinning');
    const { tier, item } = pickTrend();

    document.getElementById('orbCore').textContent = item.icon;
    const base = 'orb-wrap' + (currentMode !== 'all' ? ' ' + currentMode : '');
    orb.className = base + (currentMode === 'all' ? ' ' + tier : '');

    addHistory(tier, item);
    openModal(tier, item);

    btn.disabled = false;
    spinning = false;
  }, 680);
}

function openModal(tier, item) {
  const m = TIER_META[tier];
  const card = document.getElementById('modalCard');

  // Set tier class
  card.className = 'modal-card ' + m.css;

  // Populate content
  document.getElementById('modalTag').textContent      = m.label + ' Trend';
  document.getElementById('modalTimespan').textContent = m.span;
  document.getElementById('modalIcon').textContent     = item.icon;
  document.getElementById('modalTitleJp').textContent  = item.jp;
  document.getElementById('modalTitleEn').textContent  = item.en;
  document.getElementById('modalDesc').textContent     = item.desc;

  // Reset card transform so transition replays
  card.style.transition = 'none';
  card.style.transform  = 'translateY(32px) scale(0.95)';
  card.style.opacity    = '0';

  // Show overlay
  document.getElementById('modalOverlay').classList.add('is-open');
  document.body.style.overflow = 'hidden';

  // Trigger animation on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.style.transition = '';
      card.style.transform  = '';
      card.style.opacity    = '';
    });
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('is-open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function addHistory(tier, item) {
  history.unshift({ tier, item });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list    = document.getElementById('historyList');
  if (!history.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map((h, i) => `
    <div class="history-item ${h.tier}" onclick="openModal('${h.tier}', history[${i}].item)">
      <div class="h-pip"></div>
      <span class="h-icon">${h.item.icon}</span>
      <span class="h-name">${h.item.jp}</span>
      <span class="h-tier">${TIER_META[h.tier].label}</span>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  renderHistory();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Escape') { closeModal(); return; }
  if ((e.code === 'Space' || e.code === 'Enter') && !e.target.closest('button')) {
    e.preventDefault();
    spin();
  }
});
</script>
</body>
</html>
